version: '3.8'
services:
  postgres_db:
    image: postgres:17
    platform: linux/amd64
    container_name: spring_postgres # İsim çakışmasını önledik
    restart: always
    ports:
      - "5433:5432" # 5434 doluydu, biz 5433'ü aldık!
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: user_management_db
    volumes:
      - spring_postgres_data:/var/lib/postgresql/data # Veriler eski projeye karışmayacak

  pgadmin:
    image: dpage/pgadmin4
    container_name: spring_pgadmin
    restart: always
    ports:
      - "5051:80" # 5050 doluydu, biz 5051'den gireceğiz!
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres_db

volumes:
  spring_postgres_data: # Yepyeni ve izole bir veri alanı